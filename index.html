<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodLens — AI Mood Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <header>
    <div class="logo">🌿 MoodLens</div>
    <p class="tagline">Your AI-powered emotional journal</p>
  </header>

  <main>
    <section class="card journal-card">
      <label for="journal-input">How are you feeling today?</label>
      <textarea id="journal-input" placeholder="Write freely... describe your day, your thoughts, your feelings. AI will gently analyze your mood." rows="6"></textarea>
      <button id="analyze-btn" onclick="analyzeMood()">
        <span id="btn-text">✨ Analyze My Mood</span>
        <span id="btn-loader" class="hidden">Thinking...</span>
      </button>
    </section>

    <section class="card result-card hidden" id="result-card">
      <div class="mood-badge" id="mood-badge"></div>
      <div class="mood-score">
        <span>Mood Score</span>
        <div class="score-bar-wrap">
          <div class="score-bar" id="score-bar"></div>
        </div>
        <span id="score-value"></span>
      </div>
      <p class="ai-insight" id="ai-insight"></p>
      <div class="suggestions" id="suggestions"></div>
    </section>

    <section class="history-section" id="history-section">
      <h2>📅 Past Entries</h2>
      <div id="history-list"></div>
    </section>
  </main>

  <footer>
    Built with ❤️ using HTML, CSS, JS &amp; Claude AI API &nbsp;·&nbsp; <a href="https://github.com" target="_blank">GitHub</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
